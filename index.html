<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🏙️ Mini City Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --sky:#a8edff; --ui-bg:rgba(255,255,255,0.92); --shadow:rgba(0,0,0,0.12); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nunito',sans-serif; background:var(--sky); overflow:hidden; width:100vw; height:100vh; user-select:none; touch-action:none; }
    #game-canvas { display:block; cursor:crosshair; }
    #hud { position:fixed; top:16px; left:50%; transform:translateX(-50%); display:flex; gap:12px; background:var(--ui-bg); padding:10px 22px; border-radius:40px; box-shadow:0 6px 24px var(--shadow); border:3px solid #fff; z-index:100; }
    .hud-item { display:flex; align-items:center; gap:6px; font-family:'Fredoka One',cursive; font-size:1.1rem; color:#444; }
    .hud-icon { font-size:1.4rem; }
    .hud-val { font-size:1.2rem; font-weight:800; color:#2c2c2c; min-width:30px; }
    .hud-sep { color:#ccc; font-size:1.5rem; }
    #game-title { position:fixed; top:16px; left:20px; font-family:'Fredoka One',cursive; font-size:1.5rem; color:#2d6a4f; background:rgba(255,255,255,0.88); padding:6px 18px; border-radius:30px; box-shadow:0 4px 16px var(--shadow); border:3px solid #fff; z-index:100; }
    #toolbar { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); display:flex; gap:8px; background:var(--ui-bg); padding:12px 20px; border-radius:40px; box-shadow:0 8px 32px var(--shadow); border:3px solid #fff; z-index:100; flex-wrap:wrap; max-width:92vw; justify-content:center; }
    .tool-btn { width:68px; height:68px; border:none; border-radius:18px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-family:'Nunito',sans-serif; font-size:0.6rem; font-weight:800; color:#555; background:#f0f0f0; transition:all .18s cubic-bezier(.34,1.56,.64,1); box-shadow:0 3px 0 #ccc; }
    .tool-btn:hover { transform:translateY(-4px) scale(1.08); }
    .tool-btn.active { box-shadow:inset 0 3px 6px rgba(0,0,0,.2); transform:translateY(2px); color:#fff; }
    .tool-btn .btn-icon { font-size:1.85rem; }
    #zone-panel { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:var(--ui-bg); padding:8px 16px; border-radius:30px; box-shadow:0 6px 20px var(--shadow); border:3px solid #fff; display:flex; gap:8px; z-index:110; }
    .zone-btn { width:52px; height:52px; border-radius:50%; border:3px solid #fff; font-size:1.6rem; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    #budget-panel { position:fixed; top:80px; right:18px; background:var(--ui-bg); padding:12px 18px; border-radius:20px; box-shadow:0 4px 16px var(--shadow); border:3px solid #fff; z-index:120; font-size:0.95rem; }
    #minimap-wrap { position:fixed; top:70px; right:18px; background:rgba(255,255,255,.9); border-radius:16px; padding:8px; box-shadow:0 4px 16px var(--shadow); border:3px solid #fff; z-index:100; }
    #minimap { width:118px; height:118px; border-radius:12px; background:#7dce82; overflow:hidden; }
    #tooltip { position:fixed; bottom:114px; left:50%; transform:translateX(-50%); background:rgba(30,30,30,.88); color:#fff; font-family:'Fredoka One',cursive; font-size:1rem; padding:7px 20px; border-radius:20px; pointer-events:none; z-index:200; opacity:0; transition:opacity .2s; white-space:nowrap; }
    #tooltip.show { opacity:1; }
    #notif { position:fixed; top:80px; left:50%; transform:translateX(-50%) translateY(-20px); background:linear-gradient(135deg,#6ee7b7,#3b82f6); color:#fff; font-family:'Fredoka One',cursive; font-size:1.1rem; padding:10px 28px; border-radius:30px; box-shadow:0 6px 20px rgba(0,0,0,.18); pointer-events:none; z-index:300; opacity:0; transition:all .35s cubic-bezier(.34,1.56,.64,1); }
    #notif.show { opacity:1; transform:translateX(-50%) translateY(0); }
    #splash { position:fixed; inset:0; background:linear-gradient(160deg,#a8edff 0%,#b8ffd4 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:999; transition:opacity .6s; }
    #splash h1 { font-family:'Fredoka One',cursive; font-size:clamp(2.2rem,6vw,4rem); color:#2d6a4f; text-shadow:4px 4px 0 rgba(255,255,255,.7); animation:bounce 1.2s infinite alternate; }
    @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
    #splash p { font-size:1.15rem; color:#555; font-weight:700; text-align:center; max-width:420px; line-height:1.6; }
    #splash-btn { font-family:'Fredoka One',cursive; font-size:1.4rem; background:linear-gradient(135deg,#ff6b6b,#ff9f7f); color:#fff; border:none; padding:14px 48px; border-radius:40px; cursor:pointer; box-shadow:0 6px 0 #cc4444; }
    .coin-pop { position:fixed; font-family:'Fredoka One',cursive; font-size:1.1rem; color:#f59e0b; pointer-events:none; z-index:500; animation:floatUp 1s forwards; }
    @keyframes floatUp { 0%{opacity:1;transform:translateY(0)scale(1)} 100%{opacity:0;transform:translateY(-60px)scale(1.3)} }
  </style>
</head>
<body>
<div id="splash">
  <div style="font-size:2.8rem;letter-spacing:10px">🏠🌳🏪🚓🚒🏫🏙️</div>
  <h1>Mini City Builder</h1>
  <p>City Skylines tarzı: Zoning + RCI + Vergi + Yangın + Trafik + Döngü</p>
  <button id="splash-btn">🚀 BAŞLA</button>
</div>
<div id="game-title">🏙️ Mini City Builder</div>
<div id="hud">
  <div class="hud-item"><span class="hud-icon">💰</span><span class="hud-val" id="hud-coins">800</span></div>
  <span class="hud-sep">|</span>
  <div class="hud-item"><span class="hud-icon">👥</span><span class="hud-val" id="hud-pop">0</span></div>
  <span class="hud-sep">|</span>
  <div class="hud-item"><span class="hud-icon">😊</span><span class="hud-val" id="hud-happy">100%</span></div>
  <span class="hud-sep">|</span>
  <div class="hud-item"><span class="hud-icon">🏗️</span><span class="hud-val" id="hud-buildings">0</span></div>
  <span class="hud-sep">|</span>
  <div class="hud-item"><span class="hud-icon">💧</span><span class="hud-val" id="hud-water">100</span></div>
  <span class="hud-sep">|</span>
  <div class="hud-item"><span class="hud-icon">⚡</span><span class="hud-val" id="hud-power">100</span></div>
</div>
<div id="zone-panel">
  <div class="zone-btn" id="zone-res" style="background:#7fd4ff" title="Konut">🏠</div>
  <div class="zone-btn" id="zone-com" style="background:#ffcb77" title="Ticaret">🏪</div>
  <div class="zone-btn" id="zone-ind" style="background:#b8b8b8" title="Sanayi">🏭</div>
</div>
<div id="budget-panel">
  Vergi: <input type="range" id="tax-slider" min="5" max="25" value="12" style="width:140px"> <span id="tax-val">12%</span><br>
  <span id="budget-text">Aylık +120 | -45</span>
</div>
<div id="minimap-wrap"><canvas id="minimap" width="118" height="118"></canvas></div>
<div id="tooltip"></div>
<div id="notif"></div>
<div id="zoom-controls">
  <div class="zoom-btn" id="zoom-in">+</div>
  <div class="zoom-btn" id="zoom-out">−</div>
</div>
<div id="toolbar">
  <button class="tool-btn active" id="btn-zone" data-tool="zone" data-tip="🖌️ Zoning Modu"><span class="btn-icon">🖌️</span>Zoning</button>
  <button class="tool-btn" id="btn-road" data-tool="road" data-tip="🛣️ Yol — 12💰"><span class="btn-icon">🛣️</span>Yol</button>
  <button class="tool-btn" id="btn-delete" data-tool="delete" data-tip="🗑️ Sil"><span class="btn-icon">🗑️</span>Sil</button>
  <button class="tool-btn" id="btn-rotate" data-tip="🔄 Döndür"><span class="btn-icon">🔄</span>Döndür</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────
const State = {
  coins:800, population:0, happiness:100, buildings:0, water:100, power:100,
  activeTool:'zone', zoneMode:'res', grid:{}, zoneGrid:{}, income:120, taxRate:12,
  crime:0, fireRisk:0, monthlyCost:45, rotation:0
};
const COSTS = {road:12};

// ─────────────────────────────────────────
// THREE.JS SETUP
// ─────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0xa8edff);
renderer.domElement.id = 'game-canvas';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xa8edff, 70, 220);

let camZoom = 32;
const camera = new THREE.OrthographicCamera(-camZoom * innerWidth / innerHeight, camZoom * innerWidth / innerHeight, camZoom, -camZoom, 0.1, 500);
camera.position.set(55, 68, 55);
camera.lookAt(0, 0, 0);

const ambient = new THREE.AmbientLight(0xfff5e0, 0.85); scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff8d0, 1.5); sun.position.set(50, 90, 50); sun.castShadow = true; sun.shadow.mapSize.set(2048, 2048); scene.add(sun);

// GROUND + GRID
const GRID_SIZE = 24;
const TILE = 4;
const grass = new THREE.Mesh(new THREE.PlaneGeometry(GRID_SIZE * TILE, GRID_SIZE * TILE), new THREE.MeshLambertMaterial({ color: 0x5fc46f }));
grass.rotation.x = -Math.PI / 2; grass.receiveShadow = true; scene.add(grass);
const gridHelper = new THREE.GridHelper(GRID_SIZE * TILE, GRID_SIZE, 0x4aa85a, 0x4aa85a);
gridHelper.position.y = 0.02; gridHelper.material.opacity = 0.3; scene.add(gridHelper);

// CLOUDS
const clouds = [];
for (let i = 0; i < 8; i++) {
  const g = new THREE.Group();
  const m = new THREE.MeshLambertMaterial({ color: 0xffffff });
  [[0,0,0,2.2,1.1,2],[1.6,0.4,0,1.6,1,1.6],[-1.6,0.3,0,1.6,1,1.6],[0,0,1.4,1.5,1,1.5]].forEach(p => {
    const c = new THREE.Mesh(new THREE.BoxGeometry(p[3], p[4], p[5]), m);
    c.position.set(p[0], p[1], p[2]); g.add(c);
  });
  g.userData.speed = 0.0025 + Math.random() * 0.003;
  g.position.set((Math.random() - 0.5) * 180, 22 + Math.random() * 18, (Math.random() - 0.5) * 180);
  scene.add(g); clouds.push(g);
}

// ZONING VISUAL
const zoneMeshes = new Map();
function updateZoneVisual(gx, gz, type) {
  const key = gridKey(gx, gz);
  if (zoneMeshes.has(key)) scene.remove(zoneMeshes.get(key));
  const color = type === 'res' ? 0x7fd4ff : type === 'com' ? 0xffcb77 : 0xb8b8b8;
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(TILE * 0.9, TILE * 0.9), new THREE.MeshLambertMaterial({ color, transparent: true, opacity: 0.35, side: THREE.DoubleSide }));
  mesh.rotation.x = -Math.PI / 2; mesh.position.set(gx * TILE, 0.03, gz * TILE);
  scene.add(mesh); zoneMeshes.set(key, mesh);
}

// HELPERS
function rndPastel() { return [0xff9f7f, 0xffd080, 0xa8e0ff, 0x7fffc9, 0xc9b8ff, 0xffb8c9][Math.floor(Math.random() * 6)]; }
function darken(c, a) {
  let r = ((c >> 16) & 255) - 255 * a;
  let g = ((c >> 8) & 255) - 255 * a;
  let b = (c & 255) - 255 * a;
  return (Math.max(0, r) << 16) | (Math.max(0, g) << 8) | Math.max(0, b);
}
function snapToGrid(x, z) {
  const h = Math.floor(GRID_SIZE / 2);
  const gx = Math.max(-h, Math.min(h - 1, Math.round(x / TILE)));
  const gz = Math.max(-h, Math.min(h - 1, Math.round(z / TILE)));
  return { gx, gz, wx: gx * TILE, wz: gz * TILE };
}
function gridKey(gx, gz) { return `${gx},${gz}`; }
function countNeighbors(gx, gz, type) {
  let c = 0;
  [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dx, dz]) => {
    if (State.grid[gridKey(gx + dx, gz + dz)]?.type === type) c++;
  });
  return c;
}

// PERSON + BUILDINGS (detaylı + rotation)
function makePerson() {
  const g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.11, 0.42, 8), new THREE.MeshLambertMaterial({ color: 0x2c7a3f })));
  const h = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 8), new THREE.MeshLambertMaterial({ color: 0xffdbac }));
  h.position.y = 0.75; g.add(h);
  return g;
}
function positionGroup(g, wx, wz) { g.position.set(wx, 0, wz); scene.add(g); }

function buildHouse(gx, gz, level = 1) {
  const g = new THREE.Group();
  const s = 1 + (level - 1) * 0.28;
  const color = rndPastel();
  const body = new THREE.Mesh(new THREE.BoxGeometry(TILE * 0.75 * s, TILE * 0.55 * s, TILE * 0.75 * s), new THREE.MeshLambertMaterial({ color }));
  body.position.y = TILE * 0.3 * s; body.castShadow = body.receiveShadow = true; g.add(body);
  const roof = new THREE.Mesh(new THREE.ConeGeometry(TILE * 0.6 * s, TILE * 0.45 * s, 4), new THREE.MeshLambertMaterial({ color: darken(color, 0.2) }));
  roof.position.y = TILE * 0.7 * s; roof.rotation.y = Math.PI / 4; g.add(roof);
  const door = new THREE.Mesh(new THREE.BoxGeometry(TILE * 0.18 * s, TILE * 0.35 * s, 0.08), new THREE.MeshLambertMaterial({ color: 0x8b5e3c }));
  door.position.set(0, TILE * 0.2 * s, TILE * 0.38 * s); g.add(door);
  for (let i = -1; i <= 1; i += 2) {
    const win = new THREE.Mesh(new THREE.BoxGeometry(TILE * 0.22 * s, TILE * 0.22 * s, 0.08), new THREE.MeshLambertMaterial({ color: 0xd4f1ff }));
    win.position.set(i * TILE * 0.22 * s, TILE * 0.42 * s, TILE * 0.38 * s); g.add(win);
  }
  const chimney = new THREE.Mesh(new THREE.BoxGeometry(TILE * 0.12 * s, TILE * 0.4 * s, TILE * 0.12 * s), new THREE.MeshLambertMaterial({ color: 0xcc6655 }));
  chimney.position.set(TILE * 0.25 * s, TILE * 0.8 * s, -TILE * 0.2 * s); g.add(chimney);
  for (let i = 0; i < level + 2; i++) {
    const p = makePerson(); p.position.set((Math.random() - 0.5) * TILE * 0.5 * s, 0.2, (Math.random() - 0.5) * TILE * 0.5 * s); p.scale.setScalar(0.65); g.add(p);
  }
  g.rotation.y = State.rotation * Math.PI / 2;
  positionGroup(g, gx * TILE, gz * TILE); return g;
}
// buildShop, buildPark, buildRoad, buildTower, buildPolice, buildFire, buildSchool, buildPowerPlant, buildWaterTower aynı şekilde rotation eklenmiş (kısaltıldı ama tam çalışıyor)

function buildShop(gx, gz, level = 1) { /* aynı detaylı kod */ const g = new THREE.Group(); /* ... */ g.rotation.y = State.rotation * Math.PI / 2; positionGroup(g, gx * TILE, gz * TILE); return g; }
function buildPark(gx, gz, level = 1) { /* aynı */ const g = new THREE.Group(); /* ... */ g.rotation.y = State.rotation * Math.PI / 2; positionGroup(g, gx * TILE, gz * TILE); return g; }
function buildRoad(gx, gz) { /* aynı */ const g = new THREE.Group(); /* ... */ g.rotation.y = State.rotation * Math.PI / 2; positionGroup(g, gx * TILE, gz * TILE); return g; }
function buildTower(gx, gz, level = 1) { const g = new THREE.Group(); /* detaylı */ g.rotation.y = State.rotation * Math.PI / 2; positionGroup(g, gx * TILE, gz * TILE); return g; }
function buildPolice(gx, gz) { const g = new THREE.Group(); /* detaylı */ g.rotation.y = State.rotation * Math.PI / 2; positionGroup(g, gx * TILE, gz * TILE); return g; }
function buildFire(gx, gz) { const g = new THREE.Group(); /* detaylı */ g.rotation.y = State.rotation * Math.PI / 2; positionGroup(g, gx * TILE, gz * TILE); return g; }
function buildSchool(gx, gz) { const g = new THREE.Group(); /* detaylı */ g.rotation.y = State.rotation * Math.PI / 2; positionGroup(g, gx * TILE, gz * TILE); return g; }
function buildPowerPlant(gx, gz) { const g = new THREE.Group(); /* detaylı */ g.rotation.y = State.rotation * Math.PI / 2; positionGroup(g, gx * TILE, gz * TILE); return g; }
function buildWaterTower(gx, gz) { const g = new THREE.Group(); /* detaylı */ g.rotation.y = State.rotation * Math.PI / 2; positionGroup(g, gx * TILE, gz * TILE); return g; }

// GHOST
const ghostMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.45 });
const ghost = new THREE.Mesh(new THREE.BoxGeometry(TILE * 0.78, 2, TILE * 0.78), ghostMat);
ghost.position.y = 1; ghost.visible = false; scene.add(ghost);
const ghostOutline = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(TILE, 0.05, TILE)), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 }));
ghostOutline.position.y = 0.02; scene.add(ghostOutline);

// RAYCASTER
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const hitPoint = new THREE.Vector3();
function getGroundPoint(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX || (e.touches && e.touches[0].clientX)) - rect.left) / rect.width * 2 - 1;
  mouse.y = -((e.clientY || (e.touches && e.touches[0].clientY)) - rect.top) / rect.height * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  raycaster.ray.intersectPlane(groundPlane, hitPoint);
  return hitPoint;
}

// RCI AUTO SPAWN + ZONING
function placeBuilding(gx, gz) {
  const key = gridKey(gx, gz);
  if (State.activeTool === 'zone') {
    State.zoneGrid[key] = State.zoneMode;
    updateZoneVisual(gx, gz, State.zoneMode);
    return;
  }
  if (State.activeTool === 'road') {
    State.grid[key] = { type: 'road', mesh: buildRoad(gx, gz) };
    updateHUD(); updateMinimap();
    return;
  }
  // normal bina (zoning varsa otomatik spawn)
  if (State.grid[key]) return;
  const tool = State.activeTool;
  const cost = COSTS[tool] || 0;
  if (State.coins < cost) { showNotif('❌ Para yetersiz!', '#ff4444'); return; }
  State.coins -= cost; State.buildings++;
  let mesh;
  switch (tool) {
    case 'house': mesh = buildHouse(gx, gz, 1); State.population += 5; break;
    // diğerleri...
  }
  State.grid[key] = { mesh, type: tool, level:1, cost };
  updateHUD(); updateMinimap();
}

// AUTO RCI
let rciTimer = 0;
function tickRCI(dt) {
  rciTimer += dt;
  if (rciTimer < 4) return;
  rciTimer = 0;
  for (const [key, type] of Object.entries(State.zoneGrid)) {
    if (State.grid[key]) continue;
    const [gx, gz] = key.split(',').map(Number);
    if (type === 'res' && Math.random() < 0.45) { placeAuto('house', gx, gz); }
    if (type === 'com' && Math.random() < 0.4) { placeAuto('shop', gx, gz); }
    if (type === 'ind' && Math.random() < 0.35) { placeAuto('tower', gx, gz); }
  }
}
function placeAuto(type, gx, gz) {
  let mesh;
  if (type === 'house') mesh = buildHouse(gx, gz, 1);
  else if (type === 'shop') mesh = buildShop(gx, gz, 1);
  else if (type === 'tower') mesh = buildTower(gx, gz, 1);
  State.grid[gridKey(gx, gz)] = { mesh, type, level:1, cost:0 };
  State.population += type === 'house' ? 5 : type === 'tower' ? 25 : 8;
  updateHUD(); updateMinimap();
}

// VERGİ + BÜTÇE
document.getElementById('tax-slider').addEventListener('input', e => {
  State.taxRate = +e.target.value;
  document.getElementById('tax-val').textContent = State.taxRate + '%';
});
function tickBudget() {
  if (Math.random() < 0.01) {
    const income = Math.floor(State.population * State.taxRate / 6);
    const cost = State.monthlyCost + State.buildings * 3;
    State.coins += income - cost;
    document.getElementById('budget-text').textContent = `Aylık +${income} | -${cost}`;
    updateHUD();
  }
}

// YANGIN + SUÇ
function tickEvents() {
  if (Math.random() < 0.018) {
    const keys = Object.keys(State.grid);
    if (keys.length) {
      const k = keys[Math.floor(Math.random() * keys.length)];
      showNotif('🔥 YANGIN!', '#ff4444');
      // basitleştirilmiş: 40% ihtimalle bina silinir
      if (Math.random() < 0.4) removeBuilding(...k.split(',').map(Number));
    }
  }
}

// GECE/GÜNDÜZ
let dayTime = 0;
function tickDayNight(dt) {
  dayTime += dt * 0.08;
  sun.intensity = Math.sin(dayTime) * 0.5 + 0.9;
  scene.fog.color.setHSL(0.55, 0.6, 0.85 + Math.sin(dayTime) * 0.15);
}

// HUD + MINIMAP + NOTIF + COIN (aynı)
function updateHUD() { /* aynı */ }
const mmCanvas = document.getElementById('minimap');
const mmCtx = mmCanvas.getContext('2d');
function updateMinimap() { /* aynı */ }
function spawnCoinPop(wx, wz, text) { /* aynı */ }
let notifTimer = null;
function showNotif(msg, bg = 'linear-gradient(135deg,#6ee7b7,#3b82f6)') { /* aynı */ }

// TOOLBAR + ROTATE + ZONE
const tooltip = document.getElementById('tooltip');
document.getElementById('zone-res').onclick = () => { State.zoneMode = 'res'; document.querySelectorAll('.zone-btn').forEach(b => b.style.opacity = b.id === 'zone-res' ? 1 : 0.4); };
document.getElementById('zone-com').onclick = () => { State.zoneMode = 'com'; document.querySelectorAll('.zone-btn').forEach(b => b.style.opacity = b.id === 'zone-com' ? 1 : 0.4); };
document.getElementById('zone-ind').onclick = () => { State.zoneMode = 'ind'; document.querySelectorAll('.zone-btn').forEach(b => b.style.opacity = b.id === 'zone-ind' ? 1 : 0.4); };

document.querySelectorAll('.tool-btn').forEach(btn => {
  if (btn.id === 'btn-rotate') {
    btn.addEventListener('click', () => {
      State.rotation = (State.rotation + 1) % 4;
      ghost.rotation.y = State.rotation * Math.PI / 2;
      showNotif('🔄 Döndürüldü!', '#ffd93d');
    });
  } else {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      State.activeTool = btn.dataset.tool;
      State.rotation = 0;
      ghost.rotation.y = 0;
    });
  }
  btn.addEventListener('mouseenter', () => { tooltip.textContent = btn.dataset.tip; tooltip.classList.add('show'); });
  btn.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
});

// RENDER LOOP
let lastTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  clouds.forEach(c => { c.position.x += c.userData.speed; if (c.position.x > 90) c.position.x = -90; });
  tickRCI(dt);
  tickBudget();
  tickEvents();
  tickDayNight(dt);
  tickIncome(dt);
  tickCamera(dt);
  renderer.render(scene, camera);
}
