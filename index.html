<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel City Tycoon - Yandex Games</title>
    <script src="https://yandex.net/games/sdk/v2"></script>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { 
            border: 4px solid #444; 
            image-rendering: pixelated; /* Pixel art için kritik */
            max-width: 95vw; max-height: 80vh;
            cursor: crosshair;
        }
        #ui { margin-top: 15px; display: flex; gap: 10px; }
        button {
            padding: 10px 20px; border: none; border-radius: 4px; color: white;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 4px 0 #333;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #333; }
        .btn-house { background: #e67e22; }
        .btn-tree { background: #27ae60; }
        .btn-road { background: #7f8c8d; }
        .active { outline: 3px solid white; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <button id="houseBtn" class="btn-house active" onclick="setMode('house')">EV</button>
    <button id="roadBtn" class="btn-road" onclick="setMode('road')">YOL</button>
    <button id="treeBtn" class="btn-tree" onclick="setMode('tree')">AĞAÇ</button>
</div>

<script>
    // --- Yandex Games SDK ---
    YaGames.init().then(ysdk => {
        window.ysdk = ysdk;
        ysdk.features.LoadingProgress.report(100);
    });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const TILE_SIZE = 32;
    const GRID_SIZE = 20; // 20x20 Harita
    canvas.width = TILE_SIZE * GRID_SIZE;
    canvas.height = TILE_SIZE * GRID_SIZE;

    let currentMode = 'house';
    let map = [];

    // --- Renk Paleti (Pixel Art Tonları) ---
    const COLORS = {
        grass: '#55aa55',
        water: '#4488ff',
        sand: '#eedd88',
        house: '#cc4444',
        road: '#444444',
        tree: '#226622'
    };

    // --- Harita Oluşturma ---
    function initMap() {
        for (let y = 0; y < GRID_SIZE; y++) {
            map[y] = [];
            for (let x = 0; x < GRID_SIZE; x++) {
                let r = Math.random();
                if (r < 0.1) map[y][x] = { type: 'water' };
                else if (r < 0.15) map[y][x] = { type: 'sand' };
                else map[y][x] = { type: 'grass' };
            }
        }
    }

    // --- Çizim Fonksiyonu ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < GRID_SIZE; y++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                const tile = map[y][x];
                
                // Zemini Çiz
                ctx.fillStyle = COLORS[tile.type] || COLORS.grass;
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);

                // Izgara Çizgileri (Hafif)
                ctx.strokeStyle = 'rgba(0,0,0,0.05)';
                ctx.strokeRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);

                // Eğer üzerinde yapı varsa çiz
                if (tile.building) {
                    drawBuilding(x, y, tile.building);
                }
            }
        }
    }

    function drawBuilding(x, y, type) {
        const px = x * TILE_SIZE;
        const py = y * TILE_SIZE;
        ctx.fillStyle = COLORS[type];

        if (type === 'house') {
            // Basit Pixel Ev
            ctx.fillRect(px + 4, py + 8, TILE_SIZE - 8, TILE_SIZE - 12);
            ctx.fillStyle = '#333'; // Kapı
            ctx.fillRect(px + 12, py + 20, 8, 8);
        } else if (type === 'road') {
            ctx.fillRect(px, py + 10, TILE_SIZE, 12);
        } else if (type === 'tree') {
            ctx.fillStyle = '#442211'; // Gövde
            ctx.fillRect(px + 14, py + 20, 4, 8);
            ctx.fillStyle = COLORS.tree; // Yapraklar
            ctx.fillRect(px + 8, py + 4, 16, 16);
        }
    }

    // --- Etkileşim ---
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / (rect.width / GRID_SIZE));
        const y = Math.floor((e.clientY - rect.top) / (rect.height / GRID_SIZE));

        if (map[y][x].type !== 'water') {
            map[y][x].building = currentMode;
            draw();
        }
    });

    window.setMode = (mode) => {
        currentMode = mode;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById(mode + 'Btn').classList.add('active');
    };

    // Başlat
    initMap();
    draw();

</script>
</body>
</html>
