<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Şehir Kurmaca - Cartoon Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid #ffcc00;
        }
        .btn {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.1); }
        .blue { background: #a2d2ff; color: #003049; }
        .pink { background: #ffafcc; color: #5e001f; }
        .yellow { background: #ffea00; color: #5c4d00; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
    <script src="https://yandex.ru/games/sdk/v2"></script>
</head>
<body>

<div id="info">Tıkla ve Bina İnşa Et!</div>

<div id="ui">
    <button class="btn blue" onclick="currentType = 'ev'">Mavi Ev</button>
    <button class="btn pink" onclick="currentType = 'dükkan'">Pembe Dükkan</button>
    <button class="btn yellow" onclick="currentType = 'kule'">Sarı Kule</button>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- Yandex Games SDK Başlatma ---
    YaGames.init().then(ysdk => {
        window.ysdk = ysdk;
        console.log("Yandex SDK Hazır!");
    });

    // --- Değişkenler ---
    let currentType = 'ev';
    const buildings = [];
    const colors = {
        ev: 0xA2D2FF,    // Pastel Mavi
        dükkan: 0xFFAFCC, // Pastel Pembe
        kule: 0xFFEA00   // Canlı Sarı
    };

    // --- Sahne Kurulumu ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Gökyüzü mavisi

    // Orthographic Camera (2D / İzometrik Görünüm İçin)
    const aspect = window.innerWidth / window.innerHeight;
    const d = 10;
    const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
    camera.position.set(20, 20, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- Işıklandırma (Cartoon Tarzı İçin Parlak) ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // --- Zemin (Çimen) ---
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x7cfc00 }); // Canlı yeşil
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Izgara Yardımı (Grid)
    const grid = new THREE.GridHelper(20, 20, 0x55aa55, 0x55aa55);
    scene.add(grid);

    // --- Bina İnşa Etme Mantığı ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('mousedown', (event) => {
        // UI elemanlarına tıklanıp tıklanmadığını kontrol et
        if (event.target.tagName === 'BUTTON') return;

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(ground);

        if (intersects.length > 0) {
            const point = intersects[0].point;
            // Izgaraya oturtma (Snapping)
            const x = Math.round(point.x);
            const z = Math.round(point.z);
            
            createBuilding(x, z);
        }
    });

    function createBuilding(x, z) {
        let height = currentType === 'kule' ? 3 : 1.5;
        const geometry = new THREE.BoxGeometry(0.8, height, 0.8);
        const material = new THREE.MeshLambertMaterial({ color: colors[currentType] });
        const building = new THREE.Mesh(geometry, material);
        
        building.position.set(x, height / 2, z);
        building.castShadow = true;
        building.receiveShadow = true;
        
        // Küçük bir "belirme" animasyonu için ölçekleme
        building.scale.set(0.1, 0.1, 0.1);
        scene.add(building);
        buildings.push(building);
    }

    // --- Render Döngüsü ---
    function animate() {
        requestAnimationFrame(animate);
        
        // Animasyon: Binaları yavaşça büyüt
        buildings.forEach(b => {
            if (b.scale.x < 1) {
                b.scale.x += 0.1;
                b.scale.y += 0.1;
                b.scale.z += 0.1;
            }
        });

        renderer.render(scene, camera);
    }

    // Pencere boyutu değiştiğinde güncelle
    window.addEventListener('resize', () => {
        const aspect = window.innerWidth / window.innerHeight;
        camera.left = -d * aspect;
        camera.right = d * aspect;
        camera.top = d;
        camera.bottom = -d;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();

</script>
</body>
</html>
