<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini City Builder - Yandex Games</title>
    <script src="https://yandex.net/games/sdk/v2"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #87CEEB; }
        canvas { display: block; }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            transition: all 0.2s;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .btn-house { background-color: #FF6B6B; }
        .btn-road { background-color: #4D4D4D; }
        .btn-park { background-color: #51CF66; }
        button:hover { transform: scale(1.1); filter: brightness(1.1); }
        button.active { outline: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="ui-container">
    <button class="btn-house active" onclick="setMode('house', this)">🏠 Ev Yap</button>
    <button class="btn-road" onclick="setMode('road', this)">🛣️ Yol Yap</button>
    <button class="btn-park" onclick="setMode('park', this)">🌳 Park Yap</button>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Yandex Games SDK Başlatma ---
    let ysdk;
    YaGames.init().then(_sdk => {
        console.log('Yandex Games SDK initialized');
        ysdk = _sdk;
        ysdk.features.LoadingProgress.report(100);
    });

    // --- Değişkenler ---
    let scene, camera, renderer, controls, raycaster, mouse;
    let selectedType = 'house';
    const objects = [];

    init();
    animate();

    function init() {
        // Sahne
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Gök mavisi

        // Kamera
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 15, 15);

        // Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Kontroller
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Işıklandırma (Cartoon stil için parlak ve yumuşak)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Zemin (Canlı Yeşil Çimen)
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x7cfc00 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Izgara (Yerleştirmeyi kolaylaştırmak için)
        const grid = new THREE.GridHelper(50, 50, 0x000000, 0x000000);
        grid.material.opacity = 0.1;
        grid.material.transparent = true;
        scene.add(grid);

        // Raycaster (Tıklama tespiti)
        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        window.addEventListener('click', onMouseClick);
        window.addEventListener('resize', onWindowResize);
    }

    // --- Fonksiyonlar ---
    window.setMode = (type, btn) => {
        selectedType = type;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };

    function onMouseClick(event) {
        // UI tıklamalarını engelle
        if (event.target.tagName === 'BUTTON') return;

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children);

        if (intersects.length > 0) {
            const point = intersects[0].point;
            // Izgara üzerine sabitle (Snap to grid)
            const posX = Math.round(point.x);
            const posZ = Math.round(point.z);
            placeObject(posX, posZ);
        }
    }

    function placeObject(x, z) {
        let geometry, material;

        // Low-poly stilinde binalar
        if (selectedType === 'house') {
            geometry = new THREE.BoxGeometry(0.8, 1, 0.8);
            material = new THREE.MeshPhongMaterial({ color: 0xFFADAD }); // Pastel Kırmızı
        } else if (selectedType === 'road') {
            geometry = new THREE.BoxGeometry(1, 0.05, 1);
            material = new THREE.MeshPhongMaterial({ color: 0x333333 }); // Koyu Gri
        } else {
            geometry = new THREE.BoxGeometry(0.7, 0.4, 0.7);
            material = new THREE.MeshPhongMaterial({ color: 0x95E1D3 }); // Pastel Yeşil/Mavi
        }

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, geometry.parameters.height / 2, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>

</body>
</html>
